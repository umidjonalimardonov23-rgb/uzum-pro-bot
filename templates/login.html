<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Kirish</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#7c2cff 0%,#5a1ec9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#7c2cff,#5a1ec9);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px}
.logo-name{font-size:20px;font-weight:900;color:#1a1a2e}
.logo-sub{font-size:13px;color:#6b7280;font-weight:600;margin-top:2px}
.label{font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.input-wrap{position:relative;margin-bottom:16px}
input[type=password]{width:100%;height:48px;border:2px solid #e5e7eb;border-radius:14px;padding:0 44px 0 16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:#1a1a2e;outline:none;transition:border .2s}
input[type=password]:focus{border-color:#7c2cff}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#9ca3af}
.btn{width:100%;height:50px;border-radius:14px;background:linear-gradient(135deg,#7c2cff,#9b55ff);border:none;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(124,44,255,.4)}
.btn:active{transform:scale(.97)}
.error{background:#fff0f0;color:#ef4444;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛍</div>
    <div class="logo-name">UZUM MARKET</div>
    <div class="logo-sub">Admin Panel</div>
  </div>
  {% if error %}
  <div class="error">❌ {{ error }}</div>
  {% endif %}
  <form method="POST" action="/admin/login">
    <div class="label">🔑 Admin parol</div>
    <div class="input-wrap">
      <input type="password" name="password" id="pwd" placeholder="Parolni kiriting..." autocomplete="current-password" autofocus required>
      <button type="button" class="eye-btn" onclick="toggleEye()">👁</button>
    </div>
    <button type="submit" class="btn">🚀 Kirish</button>
  </form>
</div>
<script>
function toggleEye(){
  const i=document.getElementById('pwd');
  i.type=i.type==='password'?'text':'password';
}
</script>
</body>
</html>
